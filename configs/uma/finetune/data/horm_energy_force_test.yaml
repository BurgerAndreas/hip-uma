dataset_name: omol
normalizer_rmsd: 1.0

train_dataset:
  splits:
    train:
      src: data/horm_atomic/ts1x-val.atomic.lmdb
      metadata_path: data/horm_atomic/ts1x-val.atomic.metadata.npz
      first_n: 128
  format: atomic_lmdb
  transforms:
    common_transform:
      dataset_name: ${data.dataset_name}
    molecule_cell_transform:
      cell_size: 120.0

val_dataset:
  splits:
    val:
      src: data/horm_atomic/ts1x-val.atomic.lmdb
      metadata_path: data/horm_atomic/ts1x-val.atomic.metadata.npz
      first_n: 32
  format: atomic_lmdb
  transforms:
    common_transform:
      dataset_name: ${data.dataset_name}
    molecule_cell_transform:
      cell_size: 120.0

regress_stress: False
pass_through_head_outputs: False

heads:
  efs:
    module: fairchem.core.models.uma.escn_md.MLP_EFS_Head

tasks_list:
- _target_: fairchem.core.units.mlip_unit.mlip_unit.Task
  name: energy
  level: system
  property: energy
  loss_fn:
    _target_: fairchem.core.modules.loss.DDPMTLoss
    loss_fn:
      _target_: fairchem.core.modules.loss.PerAtomMAELoss
    coefficient: 20
  out_spec:
    dim: [1]
    dtype: float32
  normalizer:
    _target_: fairchem.core.modules.normalization.normalizer.Normalizer
    mean: 0.0
    rmsd: ${data.normalizer_rmsd}
  datasets:
    - ${data.dataset_name}
  metrics:
    - mae
    - per_atom_mae
- _target_: fairchem.core.units.mlip_unit.mlip_unit.Task
  name: forces
  level: atom
  property: forces
  train_on_free_atoms: True
  eval_on_free_atoms: True
  loss_fn:
    _target_: fairchem.core.modules.loss.DDPMTLoss
    loss_fn:
      _target_: fairchem.core.modules.loss.L2NormLoss
    reduction: mean
    coefficient: 2
  out_spec:
    dim: [3]
    dtype: float32
  normalizer:
    _target_: fairchem.core.modules.normalization.normalizer.Normalizer
    mean: 0.0
    rmsd: ${data.normalizer_rmsd}
  datasets:
    - ${data.dataset_name}
  metrics:
    - mae
    - cosine_similarity
    - magnitude_error
